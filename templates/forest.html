<!DOCTYPE html>
<html>
<head>
    <title>Focus Forest</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="forest-page">

<div class="dashboard">
    <div class="sidebar">
        <div class="logo">SP</div>
        
        <a href="/" class="nav-item stylish-btn calendar-btn" title="Dashboard" aria-label="Dashboard">
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
        </a>
        
        <a href="/forest" class="nav-item stylish-btn forest-btn active forest-link" title="Focus Forest" aria-label="Focus Forest">
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22v-6"></path><path d="M5.5 16h13l-4-5h3l-5-6-5 6h3l-4 5z"></path></svg>
        </a>
    </div>

    <div class="main">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h1>Focus Forest</h1>
            <a href="/logout" style="color:#3b82f6; text-decoration:none;">Logout</a>
        </div>

        <div class="glass-card forest-stage-card">
            <div id="forest-container">
                <img id="forest-image" src="" alt="Forest growth stage">
                <p id="forest-message"></p>
            </div>
        </div>
    </div>
</div>

<!-- Study Music Player -->
<div id="music-player">
    <div class="music-controls glass-panel">
        <div class="music-header">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="music-icon"><path d="M9 18V5l12-2v13"></path><circle cx="6" cy="18" r="3"></circle><circle cx="18" cy="16" r="3"></circle></svg>
            <span>Ambient Sounds</span>
        </div>
        
        <div class="sound-selector-wrapper">
            <select id="sound-select" class="premium-select">
                <option value="white">🌌 White Noise</option>
                <option value="brown">🤎 Brown Noise</option>
                <option value="rain">🌧️ Rain & Nature</option>
            </select>
            <div class="select-chevron">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
            </div>
        </div>

        <div class="music-player-actions">
            <button id="play-pause-btn" class="action-btn play-btn" title="Play/Pause">
                <svg class="icon-play" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
                <svg class="icon-pause" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor" style="display:none;"><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></svg>
            </button>
            <div class="volume-wrapper">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="volume-icon"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>
                <input type="range" id="volume-slider" class="premium-slider" min="0" max="1" step="0.01" value="0.5">
            </div>
        </div>
        
        <div class="audio-waves">
            <div class="wave"></div>
            <div class="wave"></div>
            <div class="wave"></div>
            <div class="wave"></div>
        </div>
    </div>
    
    <button class="music-toggle-btn premium-toggle" id="music-toggle-btn" title="Ambient Sounds">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="headphone-icon">
            <path d="M3 18v-6a9 9 0 0 1 18 0v6"></path>
            <path d="M21 19a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3zM3 19a2 2 0 0 0 2 2h1a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2H3z"></path>
        </svg>
    </button>
</div>

<div class="bottom-menu">
    <a class="menu-item" href="/?section=timer">Dashboard</a>
    <div class="menu-item active">Focus Forest</div>
</div>

<script src="{{ url_for('static', filename='js/music.js') }}"></script>
<script src="{{ url_for('static', filename='js/forest.js') }}"></script>
</body>
</html>
