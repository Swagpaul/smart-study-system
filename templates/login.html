<!DOCTYPE html>
<html>
<head>
    <title>Login - Smart Planner</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: linear-gradient(135deg, #0a0e27, #1a1f3a);
    height: 100vh;
    color: white;
    box-sizing: border-box;
}

*, *:before, *:after {
    box-sizing: inherit;
}


.auth-wrapper {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100%;
}

.auth-card {
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(25px);
    padding: 45px 40px;
    border-radius: 22px;
    width: 360px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    text-align: center;
    border: 2px solid rgba(0, 217, 255, 0.3);
}

h2 {
    margin-bottom: 30px;
    font-weight: 600;
    background: linear-gradient(90deg, #00d9ff, #ff6b35);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
}

input {
    width: 100%;
    padding: 12px;
    margin-bottom: 18px;
    border-radius: 10px;
    border: 2px solid rgba(0, 217, 255, 0.2);
    outline: none;
    font-size: 14px;
    background: rgba(255,255,255,0.08);
    color: white;
    transition: 0.3s ease;
}

input:focus {
    border-color: #00d9ff;
    box-shadow: 0 0 15px rgba(0, 217, 255, 0.4);
}

button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(135deg, #00d9ff, #ff6b35);
    color: #0a0e27;
    cursor: pointer;
    font-weight: 600;
    transition: 0.3s ease;
    box-shadow: 0 0 15px rgba(0, 217, 255, 0.4);
}

button:hover {
    background: linear-gradient(135deg, #ff6b35, #00d9ff);
    box-shadow: 0 0 25px rgba(255, 107, 53, 0.6);
    transform: translateY(-2px);
}

.switch-link {
    margin-top: 22px;
    font-size: 14px;
    color: #cbd5e1;
}

.switch-link a {
    color: #00d9ff;
    text-decoration: none;
    font-weight: 600;
    transition: 0.3s ease;
}

.switch-link a:hover {
    color: #ff6b35;
    text-shadow: 0 0 10px rgba(255, 107, 53, 0.5);
}
    </style>
</head>
<body>

<div class="auth-wrapper">

    <div class="auth-card">
        <h2>Smart Planner Login</h2>

        <form method="POST" action="/login">
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>

        <div class="switch-link">
            New to Smart Planner?
            <a href="/register">Create an account</a>
        </div>
    </div>

</div>

<script src="{{ url_for('static', filename='js/feedback.js') }}"></script>
{% include 'feedback_widget.html' %}

</body>
</html>
